<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Top 1%" />
    <meta name="application-name" content="Top 1%" />
    <meta name="theme-color" content="#0a0a0a" />
    <meta name="description" content="A trader's log, kept honestly." />

    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="/icon-512.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@200;300;400;500;700&display=swap" rel="stylesheet" />

    <title>Top 1% — Trading Journal</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; }

      /* Lock viewport — no horizontal scroll, no rubber-band, no swipe-back */
      html, body {
        margin: 0;
        padding: 0;
        background: #0a0a0a;
        min-height: 100vh;
        width: 100%;
        max-width: 100vw;
        overflow-x: hidden;
        overscroll-behavior: none;
        -webkit-overflow-scrolling: touch;
      }

      html { touch-action: pan-y; }
      body { position: relative; touch-action: pan-y; }

      #root {
        width: 100%;
        max-width: 100vw;
        overflow-x: hidden;
        min-height: 100vh;
      }

      body {
        font-family: 'JetBrains Mono', ui-monospace, monospace;
        font-weight: 300;
        font-variant-numeric: tabular-nums;
        -webkit-font-smoothing: antialiased;
        -webkit-tap-highlight-color: transparent;
        -webkit-touch-callout: none;
        -webkit-user-select: none;
        user-select: none;
      }

      /* Allow text selection where it makes sense */
      input, textarea, [contenteditable] {
        -webkit-user-select: text;
        user-select: text;
      }

      /* Scrollbars (desktop only) */
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-thumb { background: #2a2620; }
      ::-webkit-scrollbar-track { background: transparent; }
      @media (pointer: coarse) {
        ::-webkit-scrollbar { display: none; }
      }

      input, select, textarea, button {
        font-family: 'JetBrains Mono', monospace;
        font-weight: 300;
        max-width: 100%;
      }
      select {
        appearance: none;
        -webkit-appearance: none;
        background-position: right 8px center;
        background-repeat: no-repeat;
        padding-right: 24px;
      }
      input[type=range] { accent-color: #d4a747; }

      /* Tables — let them scroll internally, not the page */
      table { max-width: 100%; }

      /* iOS standalone PWA — full bleed */
      @media all and (display-mode: standalone) {
        html, body { height: 100vh; }
      }

      /* Disable iOS swipe-back navigation */
      @supports (-webkit-touch-callout: none) {
        body { overscroll-behavior-x: none; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => {});
        });
      }
      // Prevent horizontal swipe back on iOS (best-effort)
      let startX = 0;
      document.addEventListener('touchstart', e => { startX = e.touches[0].clientX; }, { passive: true });
      document.addEventListener('touchmove', e => {
        const x = e.touches[0].clientX;
        const isAtLeftEdge = startX < 20;
        if (isAtLeftEdge && x > startX) e.preventDefault();
      }, { passive: false });
    </script>
  </body>
</html>
